<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📖 建立預設集教學</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Serif TC', sans-serif;
            background-color: #f8f6f3;
            color: #1e1e1e;
            padding: 0 24px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 0 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #b8865b;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #8a6b4a;
        }

        .back-link .arrow {
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.3s;
        }

        .back-link:hover .arrow {
            transform: translateX(-4px);
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1e1e1e;
        }

        .page-title span {
            color: #b8865b;
        }

        .page-sub {
            color: #8a8a8a;
            font-size: 17px;
            margin-bottom: 30px;
        }

        .step-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px 24px 24px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
        }

        .step-card .step-num {
            display: inline-block;
            background: #b8865b;
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            padding: 2px 14px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .step-card .step-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .step-card .step-text {
            flex: 1;
            min-width: 0;
        }

        .step-card .step-text h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #1e1e1e;
        }

        .step-card .step-text p {
            color: #6b6b6b;
            font-size: 15px;
            line-height: 1.8;
        }

        .step-card .screenshot {
            flex-shrink: 0;
            width: 200px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: #ffffff;
        }

        .step-card .screenshot img {
            width: 100%;
            height: auto;
            display: block;
        }

        .step-card .screenshot .caption {
            font-size: 11px;
            color: #b0b0b0;
            text-align: center;
            padding: 6px 8px;
            background: #faf8f6;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            line-height: 1.3;
        }

        .btn-rect {
            display: inline-block;
            background: #1e1e1e;
            border: none;
            border-radius: 8px;
            padding: 14px 48px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .btn-rect:hover {
            background: #3a3a3a;
            transform: translateY(-2px);
        }
